<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard — Aurix Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .admin-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:900px){ .admin-grid{ grid-template-columns:1fr; } }
  .user-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--line); gap:10px; }
  .user-row:last-child{ border-bottom:none; }
  .user-info .name{ font-weight:600; color:var(--paper); }
  .user-info .email{ font-size:12px; color:var(--slate-dim); }
  .badge{ font-size:10px; padding:2px 6px; border-radius:10px; margin-left:8px; text-transform:uppercase; }
  .badge.flagged{ background:rgba(179,38,30,0.2); color:#E1948F; border:1px solid rgba(179,38,30,0.3); }
  .action-btns{ display:flex; gap:8px; flex-shrink:0; }
  .btn-sm{ padding:6px 10px; font-size:12px; }
  .btn-danger-sm{ padding:6px 10px; font-size:12px; border:1px solid rgba(196,60,60,0.4); color:#B3261E; background:transparent; }
  .btn-danger-sm:hover{ background:rgba(196,60,60,0.08); }
  .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(30,42,61,0.55); z-index:1000; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
  .modal-backdrop.show{ display:flex; }
  .modal{ background:var(--panel); border-radius:8px; padding:28px; max-width:520px; width:100%; border:1px solid var(--line); margin:auto; }
  .form-field{ margin-bottom:15px; }
  .form-field label{ display:block; font-size:12px; color:var(--slate-dim); margin-bottom:5px; }
  .form-field input, .form-field select, .form-field textarea{ width:100%; background:var(--ink); border:1px solid var(--line); border-radius:4px; padding:10px; color:var(--paper); font-family:inherit; }

  .txn-editor{ border:1px solid var(--line); border-radius:6px; max-height:220px; overflow-y:auto; margin-bottom:14px; }
  .txn-editor-row{ display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--line); font-size:12.5px; }
  .txn-editor-row:last-child{ border-bottom:none; }
  .txn-editor-row .desc{ flex:1; color:var(--paper); }
  .txn-editor-row .amt{ font-family:'IBM Plex Mono', monospace; width:90px; text-align:right; }
  .txn-editor-row .amt.pos{ color:var(--good); }
  .txn-editor-row .amt.neg{ color:var(--slate); }
  .txn-editor-row .del-btn{ color:#B3261E; cursor:pointer; font-size:14px; flex-shrink:0; }
  .txn-add-row{ display:grid; grid-template-columns:2fr 1fr 1fr auto; gap:6px; margin-bottom:14px; }
  .txn-add-row input, .txn-add-row select{ font-size:12.5px; padding:8px; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="appshell">
  <aside class="sidebar">
    <a href="#" class="brand"><span class="mark">A</span>Admin Portal</a>
    <nav>
      <a href="#" class="active"><span class="ic">◆</span>User Management</a>
      <a href="#" id="logout-btn"><span class="ic">◎</span>Log out</a>
    </nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-right">
        <div class="avatar-btn">AD</div>
      </div>
    </div>

    <div class="content-pad">
      <div class="welcome-row">
        <div>
          <h1>Administrator Dashboard</h1>
          <div class="lastlogin">Manage users, approvals, and system settings.</div>
        </div>
      </div>

      <div class="admin-grid">
        <div class="card reveal">
          <div class="card-head"><h3>Pending Registrations</h3></div>
          <div id="pending-list">
            <div class="empty-state"><p>No pending registrations.</p></div>
          </div>
        </div>

        <div class="card reveal">
          <div class="card-head"><h3>Active Users</h3></div>
          <div id="user-list">
            <div class="empty-state"><p>Loading users...</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Approve Modal -->
<div class="modal-backdrop" id="approve-modal">
  <div class="modal">
    <h3>Approve Registration</h3>
    <p class="sub" id="approve-user-info"></p>
    <div class="form-field">
      <label>Initial Checking Balance ($)</label>
      <input type="number" id="initial-balance" value="1000.00" step="0.01">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('approve-modal')">Cancel</button>
      <button class="btn btn-brass" id="confirm-approve-btn">Approve & Activate Account</button>
    </div>
  </div>
</div>

<!-- Reject Modal -->
<div class="modal-backdrop" id="reject-modal">
  <div class="modal">
    <h3>Reject Registration</h3>
    <p class="sub" id="reject-user-info"></p>
    <div class="form-field">
      <label>Reason (optional, internal note only)</label>
      <textarea id="reject-reason" rows="3" placeholder="e.g. Could not verify identity"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('reject-modal')">Cancel</button>
      <button class="btn btn-danger-sm" id="confirm-reject-btn" style="padding:11px 22px; font-size:14px;">Reject Registration</button>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h3>Edit User Account</h3>
    <p class="sub" id="edit-user-info"></p>
    <div class="form-field">
      <label>Checking Balance ($)</label>
      <input type="number" id="edit-checking" step="0.01">
    </div>
    <div class="form-field">
      <label>Savings Balance ($)</label>
      <input type="number" id="edit-savings" step="0.01">
    </div>
    <div class="form-field">
      <label>Custom Bank Name</label>
      <input type="text" id="edit-bank-name">
    </div>
    <div class="form-field">
      <label>Account Status</label>
      <select id="edit-status">
        <option value="active">Active</option>
        <option value="flagged">Flagged (Restricted — transactions blocked)</option>
      </select>
    </div>

    <div class="form-field">
      <label>Transaction history</label>
      <div class="txn-editor" id="txn-editor-list"></div>
      <div class="txn-add-row">
        <input type="text" id="new-txn-desc" placeholder="Description">
        <input type="number" id="new-txn-amount" placeholder="Amount" step="0.01">
        <select id="new-txn-category">
          <option>Shopping</option><option>Groceries</option><option>Dining</option>
          <option>Salary</option><option>Transfer</option><option>Bill Payment</option>
          <option>Card</option><option>Other</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="add-txn-btn" type="button">Add</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-brass" id="save-user-btn">Save Changes</button>
    </div>
    <button class="btn btn-danger-sm" id="delete-user-btn" style="width:100%; margin-top:10px; padding:11px;">Delete this account permanently</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, where
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBi_s_M8qjRVvgusbz7XryozqKrdhsJ3Y",
    authDomain: "bank-85ec7.firebaseapp.com",
    projectId: "bank-85ec7",
    storageBucket: "bank-85ec7.firebasestorage.app",
    messagingSenderId: "496220027439",
    appId: "1:496220027439:web:0fc82eba00952f747ba4da",
    measurementId: "G-S1XZ07MWG0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  if (sessionStorage.getItem('admin_verified') !== 'true') {
    window.location.href = 'admin-login.html';
  }

  // Collections tied to a user account — deleted together when an admin
  // removes an account, since there's no backend to cascade this for us.
  const USER_DATA_COLLECTIONS = [
    'users', 'accounts', 'transactions', 'cards',
    'scheduledTransfers', 'chequeDeposits', 'loanApplications', 'loginHistory'
  ];

  let selectedUserId = null;
  let editingTxns = [];

  function money(n) {
    const v = Number(n) || 0;
    return `${v < 0 ? '−' : ''}$${Math.abs(v).toFixed(2)}`;
  }

  async function loadData() {
    const usersSnap = await getDocs(collection(db, 'users'));

    const pendingDocs = [];
    const activeRows = [];

    for (const d of usersSnap.docs) {
      const data = d.data();
      if (data.isAdmin) continue;

      if (!data.isApproved && !data.isRejected) {
        pendingDocs.push({ id: d.id, data });
        continue;
      }
      if (data.isApproved) {
        const acctSnap = await getDoc(doc(db, 'accounts', d.id));
        const acct = acctSnap.exists() ? acctSnap.data() : { checkingBalance: 0, savingsBalance: 0 };
        activeRows.push(`<div class="user-row">
          <div class="user-info"><div class="name">${data.firstName} ${data.lastName} ${data.isFlagged ? '<span class="badge flagged">Flagged</span>' : ''}</div><div class="email">${data.email} · Bal: ${money((acct.checkingBalance || 0) + (acct.savingsBalance || 0))}</div></div>
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${d.id}')">Edit</button>
        </div>`);
      }
    }

    document.getElementById('pending-list').innerHTML = pendingDocs.length === 0
      ? '<div class="empty-state"><p>No pending registrations.</p></div>'
      : pendingDocs.map(({ id, data }) => `<div class="user-row">
          <div class="user-info"><div class="name">${data.firstName} ${data.lastName}</div><div class="email">${data.email}</div></div>
          <div class="action-btns">
            <button class="btn btn-brass btn-sm" onclick="openApproveModal('${id}', '${data.firstName} ${data.lastName}')">Approve</button>
            <button class="btn btn-danger-sm" onclick="openRejectModal('${id}', '${data.firstName} ${data.lastName}')">Reject</button>
          </div>
        </div>`).join('');

    document.getElementById('user-list').innerHTML = activeRows.join('') || '<div class="empty-state"><p>No active users yet.</p></div>';
  }

  window.openApproveModal = (id, name) => {
    selectedUserId = id;
    document.getElementById('approve-user-info').textContent = `Reviewing registration for ${name}`;
    document.getElementById('approve-modal').classList.add('show');
  };

  window.openRejectModal = (id, name) => {
    selectedUserId = id;
    document.getElementById('reject-user-info').textContent = `Rejecting registration for ${name}`;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal').classList.add('show');
  };

  function renderTxnEditor() {
    const list = document.getElementById('txn-editor-list');
    if (editingTxns.length === 0) {
      list.innerHTML = `<div style="padding:14px; text-align:center; color:var(--slate-dim); font-size:12.5px;">No transactions.</div>`;
      return;
    }
    const sorted = editingTxns
      .map((t, i) => ({ ...t, _idx: i }))
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    list.innerHTML = sorted.map(t => `
      <div class="txn-editor-row">
        <span class="desc">${t.description}</span>
        <span class="amt ${t.amount >= 0 ? 'pos' : 'neg'}">${money(t.amount)}</span>
        <span class="del-btn" data-idx="${t._idx}" title="Remove">✕</span>
      </div>`).join('');
    list.querySelectorAll('.del-btn').forEach(el => {
      el.addEventListener('click', () => {
        editingTxns.splice(Number(el.dataset.idx), 1);
        renderTxnEditor();
      });
    });
  }

  document.getElementById('add-txn-btn').addEventListener('click', () => {
    const desc = document.getElementById('new-txn-desc').value.trim();
    const amount = parseFloat(document.getElementById('new-txn-amount').value);
    const category = document.getElementById('new-txn-category').value;
    if (!desc || isNaN(amount)) { alert('Enter a description and amount.'); return; }
    editingTxns.push({ date: new Date().toISOString(), description: desc, amount, category });
    document.getElementById('new-txn-desc').value = '';
    document.getElementById('new-txn-amount').value = '';
    renderTxnEditor();
  });

  window.openEditModal = async (uid) => {
    selectedUserId = uid;
    const userSnap = await getDoc(doc(db, 'users', uid));
    const acctSnap = await getDoc(doc(db, 'accounts', uid));
    const txnSnap = await getDoc(doc(db, 'transactions', uid));
    const user = userSnap.data();
    const acct = acctSnap.data() || { checkingBalance: 0, savingsBalance: 0 };
    editingTxns = txnSnap.exists() ? (txnSnap.data().items || []) : [];

    document.getElementById('edit-user-info').textContent = `Editing ${user.firstName} ${user.lastName}`;
    document.getElementById('edit-checking').value = acct.checkingBalance || 0;
    document.getElementById('edit-savings').value = acct.savingsBalance || 0;
    document.getElementById('edit-bank-name').value = user.customBankName || 'Aurix Bank';
    document.getElementById('edit-status').value = user.isFlagged ? 'flagged' : 'active';
    renderTxnEditor();
    document.getElementById('edit-modal').classList.add('show');
  };

  window.closeModal = (id) => document.getElementById(id).classList.remove('show');

  // ---- Approve: pure Firestore updates, no backend needed ----
  document.getElementById('confirm-approve-btn').addEventListener('click', async () => {
    const btn = document.getElementById('confirm-approve-btn');
    btn.disabled = true; btn.textContent = 'Processing...';
    try {
      const initialBalance = parseFloat(document.getElementById('initial-balance').value) || 0;
      await updateDoc(doc(db, 'users', selectedUserId), { isApproved: true });
      await updateDoc(doc(db, 'accounts', selectedUserId), { checkingBalance: initialBalance });
      closeModal('approve-modal');
      loadData();
    } catch (e) { alert(e.message); }
    btn.disabled = false; btn.textContent = 'Approve & Activate Account';
  });

  // ---- Reject: marks the account so it never gets approved and drops out
  // of the pending list. The Firebase Auth account technically still
  // exists (deleting another user's Auth account requires a backend we're
  // not using), but they can never pass the isApproved gate at login. ----
  document.getElementById('confirm-reject-btn').addEventListener('click', async () => {
    const btn = document.getElementById('confirm-reject-btn');
    btn.disabled = true; btn.textContent = 'Rejecting...';
    try {
      await updateDoc(doc(db, 'users', selectedUserId), {
        isRejected: true,
        rejectionReason: document.getElementById('reject-reason').value.trim()
      });
      closeModal('reject-modal');
      loadData();
    } catch (e) { alert(e.message); }
    btn.disabled = false; btn.textContent = 'Reject Registration';
  });

  document.getElementById('save-user-btn').addEventListener('click', async () => {
    const btn = document.getElementById('save-user-btn');
    btn.disabled = true;
    try {
      await updateDoc(doc(db, 'users', selectedUserId), {
        customBankName: document.getElementById('edit-bank-name').value,
        isFlagged: document.getElementById('edit-status').value === 'flagged'
      });
      await updateDoc(doc(db, 'accounts', selectedUserId), {
        checkingBalance: parseFloat(document.getElementById('edit-checking').value),
        savingsBalance: parseFloat(document.getElementById('edit-savings').value)
      });
      await updateDoc(doc(db, 'transactions', selectedUserId), { items: editingTxns });
      closeModal('edit-modal');
      loadData();
    } catch (e) { alert(e.message); }
    btn.disabled = false;
  });

  // ---- Delete: removes all of this account's Firestore data. The
  // underlying Firebase Auth login can't be deleted without a backend, but
  // deleting the users doc means isApproved reads as false forever, which
  // blocks them at login the same as a rejected signup. ----
  document.getElementById('delete-user-btn').addEventListener('click', async () => {
    if (!confirm('This permanently deletes the account\'s balances, transaction history, and profile data, and blocks it from logging in again. This cannot be undone. Continue?')) return;
    const btn = document.getElementById('delete-user-btn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      await Promise.all(
        USER_DATA_COLLECTIONS.map(col => deleteDoc(doc(db, col, selectedUserId)).catch(() => {}))
      );
      closeModal('edit-modal');
      loadData();
    } catch (e) {
      alert(e.message);
    }
    btn.disabled = false; btn.textContent = 'Delete this account permanently';
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    sessionStorage.clear();
    await signOut(auth);
    window.location.href = 'admin-login.html';
  });

  onAuthStateChanged(auth, (user) => {
    if (user && user.email === 'aurixbank@gmail.com') loadData();
  });

  // Scroll reveal — was missing from this page entirely, which is why both
  // cards were permanently invisible (`.reveal` starts at opacity:0 until
  // this runs).
  document.querySelectorAll('.reveal').forEach((el, i) => { el.style.transitionDelay = `${i * 90}ms`; });
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('is-visible'); revealObserver.unobserve(entry.target); }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
  setTimeout(() => {
    document.querySelectorAll('.reveal:not(.is-visible)').forEach(el => el.classList.add('is-visible'));
  }, 2000);
</script>
</body>
</html>
